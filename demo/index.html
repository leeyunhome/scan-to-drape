<!doctypehtml><html lang=en><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Scan-to-Drape — 3D Gaussian Splatting + cloth drape, in the browser</title><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0b0b0d;color:#e6e6ea;font-family:system-ui,-apple-system,sans-serif}#canvas{display:block;width:100vw;height:100vh;outline:0;touch-action:none}#status{position:fixed;left:12px;bottom:12px;font-size:12px;color:#9a9aa2;background:rgba(0,0,0,.4);padding:6px 10px;border-radius:6px;max-width:60vw}#hint{position:fixed;right:12px;top:12px;font-size:12px;color:#9a9aa2;background:rgba(0,0,0,.4);padding:6px 10px;border-radius:6px;text-align:right}#presets{position:fixed;left:50%;top:12px;transform:translateX(-50%);display:flex;gap:6px;background:rgba(0,0,0,.4);padding:6px;border-radius:8px}#presets button{font-size:12px;color:#e6e6ea;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 10px;cursor:pointer;font-family:inherit}#presets button:hover{background:rgba(255,255,255,.18)}#presets button:active{background:rgba(255,255,255,.3)}</style></head><body><canvas id=canvas oncontextmenu=event.preventDefault()></canvas><div id=presets><button onclick='Module.ccall("appSetPreset",null,["number"],[0])'>정면</button> <button onclick='Module.ccall("appSetPreset",null,["number"],[1])'>좌측</button> <button onclick='Module.ccall("appSetPreset",null,["number"],[2])'>우측</button> <button onclick='Module.ccall("appSetPreset",null,["number"],[3])'>상단</button> <button onclick='Module.ccall("appSetPreset",null,["number"],[4])'>하단</button> <button onclick='Module.ccall("appSetPreset",null,["number"],[5])'>리셋</button></div><div id=hint>drag to orbit · scroll to zoom · R to reset view</div><div id=status>loading…</div><script>var statusEl=document.getElementById("status"),Module={canvas:document.getElementById("canvas"),setStatus:function(t){statusEl.textContent=t||"ready"},print:function(t){console.log(t)},printErr:function(t){console.error(t)}}</script><script async src=viewer.js></script></body></html>
